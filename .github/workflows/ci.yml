name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swiftc --version

      - name: Build
        run: ./scripts/build.sh

      - name: Self-test
        run: ./build/Voica.app/Contents/MacOS/Voica --test-all
